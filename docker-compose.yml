version: '3.8'

# All secrets are driven by env vars — set them in a .env file or shell environment.
# Required: OPENAI_API_KEY, SECRET_KEY
# Optional overrides: BACKEND_PORT, FRONTEND_PORT, DB_PORT, MINIO_PORT, MINIO_CONSOLE_PORT

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-time_logger_game}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MinIO (object storage — S3-compatible) ──────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-10000}:10000"
    volumes:
      - ./backend:/app
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      PORT: "10000"
      DATABASE_URL: "postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-time_logger_game}"
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-dummy_key}"
      S3_ENDPOINT_URL: "http://minio:9000"
      S3_ACCESS_KEY: "${MINIO_ROOT_USER:-minioadmin}"
      S3_SECRET_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      S3_BUCKET: "time-logger-audio"
      S3_PUBLIC_ENDPOINT_URL: "http://localhost:9000"
      ALLOWED_ORIGINS: '["http://localhost:${FRONTEND_PORT:-3000}"]'
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      DB_ECHO: "false"
    command: python scripts/start.py
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:10000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Worker (audio pipeline) ──────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      DATABASE_URL: "postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-time_logger_game}"
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-dummy_key}"
      S3_ENDPOINT_URL: "http://minio:9000"
      S3_ACCESS_KEY: "${MINIO_ROOT_USER:-minioadmin}"
      S3_SECRET_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      S3_BUCKET: "time-logger-audio"
    command: python scripts/worker.py
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      backend:
        condition: service_healthy   # ensures migrations run before worker starts

  # ── Frontend (React) ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      REACT_APP_API_URL: "http://localhost:${BACKEND_PORT:-10000}"
      REACT_APP_GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      PORT: "3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
