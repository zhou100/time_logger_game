version: '3.8'

services:
  test_db:
    image: postgres:14
    environment:
      POSTGRES_DB: time_logger_test_e2e
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "5433:5432"  # Using different port to avoid conflicts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d time_logger_test_e2e"]
      interval: 5s
      timeout: 5s
      retries: 5
