# Render.com deployment configuration
#
# Services deployed:
#   1. backend   — FastAPI web service (API + WebSocket)
#   2. worker    — audio pipeline background worker
#
# Database: Supabase (external — set DATABASE_URL in Render dashboard)
# Storage:  Cloudflare R2  (external — set S3_* vars in Render dashboard)
#
# Required secrets (set manually in Render dashboard, never commit):
#   DATABASE_URL, SECRET_KEY, OPENAI_API_KEY,
#   S3_ENDPOINT_URL, S3_ACCESS_KEY, S3_SECRET_KEY
#
# Optional:
#   ALLOWED_ORIGINS  (comma-separated, default: your Pages domain)

services:

  # ── API server ──────────────────────────────────────────────────────────────
  - type: web
    name: time-logger-backend
    env: docker
    region: oregon
    plan: starter          # upgrade to standard for always-on + more RAM
    healthCheckPath: /health
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false        # set in Render dashboard → Supabase session-pooler URL
                           # format: postgresql+asyncpg://postgres.[ref]:[pw]@aws-0-[region].pooler.supabase.com:5432/postgres

      - key: SECRET_KEY
        sync: false        # openssl rand -hex 32

      - key: OPENAI_API_KEY
        sync: false

      # Cloudflare R2
      - key: S3_ENDPOINT_URL
        sync: false        # https://<ACCOUNT_ID>.r2.cloudflarestorage.com
      - key: S3_ACCESS_KEY
        sync: false        # R2 API token Access Key ID
      - key: S3_SECRET_KEY
        sync: false        # R2 API token Secret Access Key
      - key: S3_BUCKET
        value: time-logger-audio
      - key: S3_REGION
        value: auto        # R2 uses "auto" as the region

      # CORS — set to your Cloudflare Pages URL
      - key: ALLOWED_ORIGINS
        sync: false        # e.g. https://time-logger.pages.dev,https://yourdomain.com

      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: DB_ECHO
        value: "false"
      - key: PORT
        value: "10000"

  # ── Audio pipeline worker ───────────────────────────────────────────────────
  - type: worker
    name: time-logger-worker
    env: docker
    region: oregon
    plan: starter
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    startCommand: python scripts/worker.py
    envVars:
      - key: DATABASE_URL
        sync: false        # same Supabase URL as backend
      - key: OPENAI_API_KEY
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET
        value: time-logger-audio
      - key: S3_REGION
        value: auto
      - key: SECRET_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
