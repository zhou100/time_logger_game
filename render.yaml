# Render Blueprint — Time Logger Game
# https://render.com/docs/blueprint-spec
# Database: Supabase PostgreSQL (not Render-managed)
# Frontend: Cloudflare Pages (not Render — see .github/workflows/deploy.yml)
# Worker: embedded in backend via asyncio background task

services:
  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  - type: web
    name: time-logger-backend
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false  # Supabase PostgreSQL: postgresql+asyncpg://...@db.xxx.supabase.co:5432/postgres
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "240"
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET
        value: time-logger-audio
      - key: S3_PUBLIC_ENDPOINT_URL
        sync: false  # For R2: same as S3_ENDPOINT_URL. Used in presigned URLs sent to browser.
      - key: S3_REGION
        value: auto
      - key: ALLOWED_ORIGINS
        sync: false  # Set to Cloudflare Pages URL, e.g. ["https://time-logger-game.pages.dev"]
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
