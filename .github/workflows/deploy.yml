name: CI

# Runs on every push and pull request to main.
#
# Deployment is handled automatically by the hosting platforms:
#   Backend + Worker → Render.com  (detects pushes to main via GitHub integration,
#                                    runs render.yaml, applies migrations on startup)
#   Frontend         → Cloudflare Pages (detects pushes to main via GitHub integration,
#                                         runs npm run build, deploys static output)
#
# This workflow therefore only needs to: test, lint, and verify the build.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: lint + test ──────────────────────────────────────────────────
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: time_logger_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          # Use a dummy OpenAI key — tests that require a real key are skipped
          OPENAI_API_KEY: dummy_key_for_testing
          SECRET_KEY: ci-secret-key-not-for-production
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5433/time_logger_test
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5433/time_logger_test
          ENVIRONMENT: test
          TEST_MODE: "true"
        run: pytest -x -q

  # ── Frontend: type-check + build ─────────────────────────────────────────
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        env:
          # Point at a placeholder for CI — Pages sets the real URL via its dashboard
          REACT_APP_API_URL: https://time-logger-backend.onrender.com
          CI: "false"   # treat warnings as non-fatal during build
        run: npm run build
